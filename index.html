<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Simples</title>

    <!-- SEO -->
    <meta name="description" content="Página de login simples feita em HTML e CSS">
    <meta name="keywords" content="login, html, css, seo">
    <meta name="author" content="Gerson Miranda">
    <meta name="robots" content="index, follow">

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <h1>Bem-vindo</h1>
</header>

<main>
    <section>
        <form>
            <h2>Entrar</h2>

            <label for="email">E-mail</label>
            <input type="email" id="email" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" required>

            <button type="submit">Login</button>
        </form>
    </section>
</main>

<footer>
    <p>© 2026 - Projeto de Login</p>
</footer>

</body>
</html>
